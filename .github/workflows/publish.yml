name: Publish @soldy/mcp

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bunx @biomejs/biome check --no-errors-on-unmatched --files-ignore-unknown=true .

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Check if version already published
        id: published
        run: |
          if npm view @soldy/mcp@${{ steps.version.outputs.version }} version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Version ${{ steps.version.outputs.version }} is already published to npm. Skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.already_published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: steps.published.outputs.already_published == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release @soldy/mcp ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"
