name: Publish @soldy_ai/mcp

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version needs publishing
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          if npm view @soldy_ai/mcp@$VERSION version 2>/dev/null; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is already published. Skipping."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: $VERSION"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bunx @biomejs/biome check --no-errors-on-unmatched --files-ignore-unknown=true .

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.check-version.outputs.tag }}" -m "Release @soldy_ai/mcp ${{ needs.check-version.outputs.version }}"
          git push origin "${{ needs.check-version.outputs.tag }}"
